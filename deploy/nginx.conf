# /etc/nginx/sites-available/uzmanrot
# After creating this file:
#   sudo ln -s /etc/nginx/sites-available/uzmanrot /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream uzmanrot_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name 178.105.52.161;

    # Max upload size (e.g. customer photos)
    client_max_body_size 25M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/plain
        text/xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Long-cache static Next.js assets (immutable build output)
    location /_next/static/ {
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_pass http://uzmanrot_upstream;
    }

    # Public files
    location /public/ {
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
        proxy_pass http://uzmanrot_upstream;
    }

    # Main proxy to Next.js
    location / {
        proxy_pass http://uzmanrot_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket / streaming support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 5s;

        proxy_buffering off;
    }

    # Block access to dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }
}
